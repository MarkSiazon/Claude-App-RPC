<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Claude Wrapped · your year with Claude Code</title>
<meta name="description" content="Your year on Claude Code as an animated story: hours, streaks, tokens, top language, peak hours. Publish yours with one command: claude-rpc wrapped --publish." />
<link rel="canonical" href="https://claude-rpc.com/wrapped" />
<link rel="icon" type="image/png" href="/img/favicon.png" />
<link rel="apple-touch-icon" href="/img/apple-touch-icon.png" />
<meta property="og:site_name" content="claude-rpc" />
<meta property="og:title" content="Claude Wrapped · your year with Claude Code" />
<meta property="og:description" content="An animated year-in-review for Claude Code. Publish yours with one command: claude-rpc wrapped --publish" />
<meta property="og:image" content="https://claude-rpc.com/img/og.png" />
<meta property="og:url" content="https://claude-rpc.com/wrapped" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:image" content="https://claude-rpc.com/img/og.png" />
<meta name="theme-color" content="#1a1611" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* Claude Wrapped — full-screen, animated, Spotify-Wrapped-style story.
   This is the LOCAL `claude-rpc wrapped` experience (src/server/assets/
   wrapped.css) served on the web from the published payload. Keep the two in
   lockstep — the local page is the source of truth for look and motion. */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --ink: #1a1611; --paper: #f4ede0; --rust: #c2491e; --rust3: #f08a4a;
  --tape: #f2d76e; --grass: #4a9462; --blurple: #5865f2; --plum: #7b3f6b;
}
html, body { height: 100%; overflow: hidden; background: var(--ink); }
body {
  font-family: 'Space Grotesk', system-ui, sans-serif;
  color: var(--paper); -webkit-font-smoothing: antialiased;
  user-select: none; -webkit-user-select: none;
}
/* landing / error states may need to scroll on short screens */
body.page { overflow: auto; user-select: text; -webkit-user-select: text; }
.boot {
  position: fixed; inset: 0; display: grid; place-items: center;
  font-family: 'JetBrains Mono', monospace; color: var(--paper); opacity: 0.7;
  letter-spacing: 1px;
}
.dots::after { content: ''; animation: dots 1.4s steps(4, end) infinite; }
@keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }

/* ── story shell ─────────────────────────────────────────────── */
.story { position: fixed; inset: 0; overflow: hidden; }
.bars {
  position: absolute; top: 0; left: 0; right: 0; z-index: 30;
  display: flex; gap: 5px; padding: 14px 16px;
}
.bar { flex: 1; height: 3px; border-radius: 3px; background: rgba(255,255,255,0.28); overflow: hidden; }
.bar > i { display: block; height: 100%; width: 0; background: rgba(255,255,255,0.95); }
.bar.done > i { width: 100%; }
.bar.active > i { animation: fill var(--dur, 5500ms) linear forwards; }
.story.paused .bar.active > i { animation-play-state: paused; }
@keyframes fill { to { width: 100%; } }

.brandtag {
  position: absolute; top: 26px; left: 0; right: 0; z-index: 25; text-align: center;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 3px;
  text-transform: uppercase; opacity: 0.65; pointer-events: none;
}

/* nav tap zones */
.tap { position: absolute; top: 0; bottom: 0; width: 35%; z-index: 20; cursor: pointer; }
.tap.left { left: 0; } .tap.right { right: 0; width: 65%; }

/* ── slides ──────────────────────────────────────────────────── */
.slide {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  padding: 64px 30px; gap: 14px;
  opacity: 0; visibility: hidden; transition: opacity 0.45s ease;
}
.slide.active { opacity: 1; visibility: visible; }
.slide.ink    { background: radial-gradient(125% 125% at 50% 0%, #2c241b 0%, #1a1611 55%, #0e0b07 100%); color: var(--paper); }
.slide.rust   { background: linear-gradient(155deg, #d6551e 0%, #b03c14 58%, #8d2f11 100%); color: var(--paper); }
.slide.gold   { background: linear-gradient(155deg, #f7e294 0%, #f0cd54 55%, #e3b133 100%); color: var(--ink); }
.slide.grass  { background: linear-gradient(155deg, #59ab76 0%, #418456 58%, #316843 100%); color: var(--paper); }
.slide.blurple{ background: linear-gradient(155deg, #717bff 0%, #5158d6 52%, #6b3f86 100%); color: var(--paper); }
.slide.plum   { background: linear-gradient(155deg, #9c5085 0%, #6e3760 55%, #4b2643 100%); color: var(--paper); }
.slide.paper  { background: linear-gradient(155deg, #f9f3e8 0%, #f1e7d6 55%, #e5d9c0 100%); color: var(--ink); }

/* content sits above the watermark + glow */
.slide > * { position: relative; z-index: 1; }

/* soft floating glow blob behind everything */
.slide::before {
  content: ''; position: absolute; z-index: 0; width: 80vmin; height: 80vmin; border-radius: 50%;
  left: 50%; top: 15%; transform: translate(-50%, -50%);
  background: radial-gradient(closest-side, rgba(255,255,255,0.17), transparent 72%);
  pointer-events: none; filter: blur(10px); animation: float 9s ease-in-out infinite;
}
.slide.gold::before, .slide.paper::before { background: radial-gradient(closest-side, rgba(194,73,30,0.14), transparent 72%); }
@keyframes float { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-45%, -57%) scale(1.15); } }

/* giant faded background number / glyph */
.wm {
  position: absolute; inset: 0; z-index: 0; display: grid; place-items: center; pointer-events: none;
  font-weight: 800; font-size: 46vmin; line-height: 1; letter-spacing: -6px;
  opacity: 0.075; transform: rotate(-9deg); white-space: nowrap;
}

/* subtle dot grid texture */
.slide::after {
  content: ''; position: absolute; z-index: 0; inset: 0; pointer-events: none; opacity: 0.09;
  background-image: radial-gradient(currentColor 1px, transparent 1.4px);
  background-size: 26px 26px;
}

/* entrance — children with .anim blur + rise in, staggered */
.slide .anim { opacity: 0; transform: translateY(30px) scale(0.97); filter: blur(7px); }
.slide.active .anim { animation: rise 0.75s cubic-bezier(.2,.7,.2,1) forwards; animation-delay: calc(var(--i, 0) * 0.13s + 0.12s); }
@keyframes rise { to { opacity: 1; transform: none; filter: blur(0); } }
.slide.active .pop { animation: pop 0.65s cubic-bezier(.2,1.4,.4,1) forwards; animation-delay: calc(var(--i, 0) * 0.13s + 0.16s); }
@keyframes pop { 0% { opacity: 0; transform: scale(0.55); } 100% { opacity: 1; transform: scale(1); } }

.kicker { font-family: 'JetBrains Mono', monospace; font-size: clamp(13px, 3.6vw, 17px); letter-spacing: 1px; opacity: 0.85; max-width: 16ch; line-height: 1.5; }
.huge   { font-weight: 800; font-size: clamp(64px, 22vw, 168px); line-height: 0.92; letter-spacing: -4px; }
.big    { font-weight: 800; font-size: clamp(40px, 13vw, 104px); line-height: 0.98; letter-spacing: -2px; }
.sub    { font-family: 'JetBrains Mono', monospace; font-size: clamp(13px, 3.6vw, 16px); opacity: 0.8; max-width: 26ch; line-height: 1.6; }
.unit   { font-weight: 700; font-size: clamp(22px, 7vw, 44px); letter-spacing: -1px; }
.tapebadge {
  display: inline-block; background: var(--tape); color: var(--ink);
  font-family: 'JetBrains Mono', monospace; font-weight: 700; letter-spacing: 1px;
  padding: 7px 14px; border: 2px solid var(--ink); transform: rotate(-2deg);
  font-size: clamp(15px, 4.5vw, 22px); text-transform: uppercase;
}
.gif { width: clamp(96px, 28vw, 150px); image-rendering: auto; }

/* model split bars */
.msplit { width: min(86vw, 420px); display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
.msrow { display: flex; align-items: center; gap: 10px; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
.msrow .lbl { width: 88px; text-align: right; opacity: 0.9; }
.mstrack { flex: 1; height: 14px; background: rgba(0,0,0,0.18); border-radius: 8px; overflow: hidden; }
.slide.gold .mstrack, .slide.paper .mstrack { background: rgba(0,0,0,0.12); }
.msfill { display: block; height: 100%; width: 0; background: currentColor; border-radius: 8px;
  transition: width 0.95s cubic-bezier(.2,.7,.2,1) 0.35s; }
.slide.active .msfill { width: var(--w, 0%); }
.msrow .pct { width: 44px; opacity: 0.85; }

/* ── finale summary ──────────────────────────────────────────── */
/* z-index lifts the card + action buttons ABOVE the full-screen .tap nav
   zones (z-index 20) — otherwise the tap layer swallows every button click. */
.summary { width: min(92vw, 460px); position: relative; z-index: 24; }
.card {
  background: var(--paper); color: var(--ink); border: 2px solid var(--ink);
  box-shadow: 8px 9px 0 rgba(0,0,0,0.35); padding: 24px 24px 20px; text-align: left;
}
.card h2 { font-size: clamp(26px, 8vw, 36px); letter-spacing: -1.5px; margin-bottom: 2px; }
.card .meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #5c5147; margin-bottom: 16px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 18px; }
.cellk { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: #5c5147; text-transform: uppercase; }
.cellv { font-weight: 800; font-size: clamp(20px, 6vw, 26px); letter-spacing: -0.5px; line-height: 1.1; }
.cellv.rust { color: var(--rust); } .cellv.grass { color: var(--grass); }
.foot { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #8a7c6d; margin-top: 16px; border-top: 1px dashed #c9bca3; padding-top: 10px; }
.actions { display: flex; gap: 10px; justify-content: center; margin-top: 22px; flex-wrap: wrap; }
.btn {
  font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 13px;
  padding: 11px 18px; border: 2px solid var(--paper); background: transparent; color: var(--paper);
  cursor: pointer; letter-spacing: 0.5px; border-radius: 2px; text-decoration: none; display: inline-block;
}
.btn.primary { background: var(--paper); color: var(--ink); }
.btn:hover { transform: translateY(-1px); }

.hint { position: absolute; bottom: 16px; left: 0; right: 0; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 10px; opacity: 0.5; z-index: 25; pointer-events: none; }
@media (max-width: 420px) { .grid { gap: 12px 14px; } }

/* ── web-only: landing + empty states (no handle / nothing published) ── */
.page-wrap {
  min-height: 100%; display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center; padding: 72px 26px 56px; gap: 16px;
  background: radial-gradient(125% 125% at 50% 0%, #2c241b 0%, #1a1611 55%, #0e0b07 100%);
}
.page-wrap .kicker { max-width: none; }
.page-wrap .big { font-size: clamp(38px, 9vw, 84px); }
.page-wrap .sub { max-width: 44ch; }
.homelink {
  position: fixed; top: 18px; left: 20px; z-index: 40;
  font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--paper);
  opacity: 0.6; text-decoration: none;
}
.homelink:hover { opacity: 1; text-decoration: underline; text-decoration-style: wavy; text-underline-offset: 3px; }
.handle-row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }
.handle-row input {
  font-family: 'JetBrains Mono', monospace; font-size: 15px; padding: 12px 14px;
  background: rgba(255,255,255,0.07); color: var(--paper);
  border: 2px solid rgba(244,237,224,0.5); border-radius: 2px; min-width: 220px; outline: none;
}
.handle-row input:focus { border-color: var(--paper); }
.cmds {
  margin-top: 22px; text-align: left; font-family: 'JetBrains Mono', monospace; font-size: 13px;
  background: rgba(0,0,0,0.35); border: 1px dashed rgba(244,237,224,0.35);
  padding: 16px 20px; border-radius: 4px; line-height: 2; user-select: text; -webkit-user-select: text;
}
.cmds .c { color: #f0cd54; }
.cmds .d { opacity: 0.55; }
</style>
</head>
<body>
<a class="homelink" href="/">← claude-rpc</a>
<div id="app"><div class="boot">building the year<span class="dots"></span></div></div>
<script>
(() => {
  'use strict';
  const app = document.getElementById('app');

  // Web wiring — buildSlides/mount below are the LOCAL wrapped client
  // (src/server/assets/wrapped.client.js) verbatim, save for pronouns and
  // where the finale buttons point. The web page only changes where the data
  // comes from (the worker's published payload) via the adapter at the boot.
  const WORKER = localStorage.getItem('crpcWorkerOverride') || 'https://claude-rpc-totals.claude-rpc.workers.dev';
  const SITE = 'https://claude-rpc.com';

  // /wrapped/<handle> (vercel rewrite) or ?h=<handle> fallback.
  const m = location.pathname.match(/^\/wrapped\/([^/]+)\/?$/);
  const HANDLE = decodeURIComponent(m ? m[1] : (new URLSearchParams(location.search).get('h') || '')).trim().toLowerCase();
  const YEAR_PARAM = new URLSearchParams(location.search).get('year') || '';

  // GitHub login return — /auth/callback 302s back here with the session in
  // the URL fragment (same contract as /link and /squads). Store + strip.
  {
    const fm = location.hash.match(/#token=([^&]+)&gh=([^&]+)/);
    if (fm) {
      try {
        localStorage.setItem('crpcTok', decodeURIComponent(fm[1]));
        localStorage.setItem('crpcGh', decodeURIComponent(fm[2]));
      } catch { /* storage blocked — the one-liner block just stays logged-out */ }
      history.replaceState(null, '', location.pathname + location.search);
    }
  }
  const TOK = localStorage.getItem('crpcTok') || '';
  const GH = localStorage.getItem('crpcGh') || '';

  // ── format helpers ───────────────────────────────────────────
  const fmtNum = (n) => {
    n = +n || 0;
    if (n < 1000) return String(Math.round(n));
    if (n < 1e6) return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'k';
    if (n < 1e9) return (n / 1e6).toFixed(2).replace(/\.?0+$/, '') + 'M';
    return (n / 1e9).toFixed(2).replace(/\.?0+$/, '') + 'B';
  };
  const fmtHours = (ms) => { const h = (ms || 0) / 3.6e6; return h < 1 ? Math.round(h * 60) + 'm' : h < 10 ? h.toFixed(1) + 'h' : Math.round(h) + 'h'; };
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
  const GIF = 'https://cdn.qualit.ly/';

  // anim-stagger style helper
  let _i = 0; const A = () => `style="--i:${_i++}"`;

  let _shareText = '';   // built in the finale slide, consumed by wireFinale
  let _shareUrl = SITE + '/wrapped';
  let _posterUrl = '';

  // ── build the story slides from the wrapped payload ──────────
  function buildSlides(d) {
    const out = [];
    const hours = (d.activeMs || 0) / 3.6e6;
    const perDay = d.prompts / Math.max(1, d.daysSinceFirst);
    const pad2 = (h) => String(h).padStart(2, '0');

    const year = d.year;
    const S = (cls, body, dur, wm) => { _i = 0; out.push({ cls, html: (wm != null && wm !== '' ? `<div class="wm">${esc(wm)}</div>` : '') + body, dur: dur || 5200 }); };

    // 1. intro
    S('ink', `
      <img class="gif anim" ${A()} src="${GIF}clawd-working-building.gif" alt="" />
      <div class="kicker anim" ${A()}>claude-rpc presents</div>
      <div class="big anim" ${A()}>${esc(d.who)}'s Year<br/>on Claude Code</div>
      <div class="sub anim" ${A()}>${esc(d.daysSinceFirst)} days in the making · tap →</div>`, 4200, year);

    // 2. hours
    S('rust', `
      <div class="kicker anim" ${A()}>${esc(d.who)} spent</div>
      <div class="huge anim" ${A()}><span data-count="${hours}" data-fmt="1dp">0</span></div>
      <div class="unit anim" ${A()}>hours with Claude</div>
      <div class="sub anim" ${A()}>across ${fmtNum(d.sessions)} sessions${d.bestDay ? ` · the biggest day was ${fmtHours(d.bestDay.hours * 3.6e6)}` : ''}</div>`);

    // 3. sessions + streak
    S('gold', `
      <div class="kicker anim" ${A()}>and opened</div>
      <div class="huge anim" ${A()}><span data-count="${d.sessions}" data-fmt="num">0</span></div>
      <div class="unit anim" ${A()}>sessions</div>
      <div class="sub anim" ${A()}>longest streak: <b>${d.longestStreak} days</b> in a row${d.streak ? ` · ${d.streak} going at publish` : ''}</div>`);

    // 4. prompts
    S('grass', `
      <div class="kicker anim" ${A()}>asking</div>
      <div class="huge anim" ${A()}><span data-count="${d.prompts}" data-fmt="num">0</span></div>
      <div class="unit anim" ${A()}>prompts</div>
      <div class="sub anim" ${A()}>that's about <b>${perDay < 10 ? perDay.toFixed(1) : Math.round(perDay)}</b> a day, every day</div>`);

    // 5. tokens
    S('blurple', `
      <div class="kicker anim" ${A()}>moving</div>
      <div class="huge anim" ${A()}><span data-count="${d.tokens}" data-fmt="num">0</span></div>
      <div class="unit anim" ${A()}>tokens</div>
      <div class="sub anim" ${A()}>${d.cachePct}% reused from cache. Claude has a good memory</div>`);

    // 6. top language
    if (d.topLanguage) S('plum', `
      <div class="kicker anim" ${A()}>mostly speaking</div>
      <div class="anim" ${A()}><span class="tapebadge pop">${esc(d.topLanguage.name)}</span></div>
      <div class="sub anim" ${A()}>${d.topLanguage.edits ? fmtNum(d.topLanguage.edits) + ' edits · ' : ''}the number-one language</div>`);

    // 7. hotspot file
    if (d.hotspot) {
      const age = d.hotspot.daysSinceLastEdit == null ? '' : d.hotspot.daysSinceLastEdit === 0 ? ' · still warm today' : ` · last touched ${d.hotspot.daysSinceLastEdit}d ago`;
      S('ink', `
        <div class="kicker anim" ${A()}>always coming back to</div>
        <div class="big anim" ${A()} style="font-family:'JetBrains Mono',monospace;font-size:clamp(30px,9vw,68px);--i:1">${esc(d.hotspot.name)}</div>
        <div class="sub anim" ${A()}>${fmtNum(d.hotspot.count)} edits${age}</div>`);
    }

    // 8. peak time
    if (d.peakWeekday && d.peakHour != null) S('rust', `
      <div class="kicker anim" ${A()}>in the zone on</div>
      <div class="big anim" ${A()}>${esc(d.peakWeekday.name)}s</div>
      <div class="unit anim" ${A()}>around ${pad2(d.peakHour)}:00</div>
      <div class="sub anim" ${A()}>the most productive window</div>`);

    // 9. model split
    if (d.modelSplit && d.modelSplit.length) {
      const rows = d.modelSplit.filter((mm) => mm.costPct > 0).map((mm) => {
        const pct = Math.round(mm.costPct * 100);
        return `<div class="msrow anim" ${A()}><span class="lbl">${esc(mm.model)}</span><span class="mstrack"><span class="msfill" style="--w:${pct}%"></span></span><span class="pct">${pct}%</span></div>`;
      }).join('');
      S('paper', `
        <div class="kicker anim" ${A()} style="--i:0">the models, by spend</div>
        <div class="msplit">${rows}</div>
        <div class="sub anim" ${A()} style="opacity:.7">${esc((d.modelSplit[0] || {}).model || '')} did most of the heavy lifting</div>`);
    }

    // 10. lines
    if (d.linesAdded) S('grass', `
      <div class="kicker anim" ${A()}>together they wrote</div>
      <div class="huge anim" ${A()}><span data-count="${d.linesAdded}" data-fmt="num">0</span></div>
      <div class="unit anim" ${A()}>lines of code</div>
      <div class="sub anim" ${A()}>${d.linesNet >= 0 ? '+' : '−'}${fmtNum(Math.abs(d.linesNet))} net after the dust settled</div>`);

    // 11. finale summary
    const cell = (k, v, cls) => `<div><div class="cellk">${k}</div><div class="cellv ${cls || ''}">${v}</div></div>`;
    _shareText = `${d.who}'s year on Claude Code: ${fmtHours(d.activeMs)} across ${fmtNum(d.sessions)} sessions · `
      + `${fmtNum(d.prompts)} prompts · ${fmtNum(d.tokens)} tokens · ${(d.longestStreak || 0)}d best streak.\n\n${_shareUrl}`;
    S('ink', `
      <div class="summary">
        <div class="card pop" style="--i:0">
          <h2>${esc(d.who)}'s Year on Claude Code</h2>
          <div class="meta">@${esc(d.handle)} · ${esc(String(year))}${d.verified ? ' · verified ✓' : ''}</div>
          <div class="grid">
            ${cell('Time', fmtHours(d.activeMs), 'rust')}
            ${cell('Sessions', fmtNum(d.sessions))}
            ${cell('Prompts', fmtNum(d.prompts))}
            ${cell('Tokens', fmtNum(d.tokens))}
            ${cell('Streak', (d.longestStreak || 0) + 'd')}
            ${cell('Top lang', d.topLanguage ? esc(d.topLanguage.name) : '—')}
            ${cell('Lines', (d.linesNet >= 0 ? '+' : '−') + fmtNum(Math.abs(d.linesNet)), 'grass')}
            ${cell('Hotspot', d.hotspot ? esc(d.hotspot.name) : '—')}
          </div>
          <div class="foot">made with claude-rpc · claude-rpc.com/wrapped</div>
        </div>
        <div class="actions">
          <button class="btn primary" id="w-replay">↺ replay</button>
          <a class="btn" id="w-poster" href="${_posterUrl}" target="_blank" rel="noopener">card ↗</a>
          <button class="btn" id="w-share">share ↗</button>
        </div>
      </div>
      <div class="hint">screenshot the card, or tap share to spread the wrapped</div>`, 9_000_000); // last slide: effectively no auto-advance

    return out;
  }

  // ── story engine ─────────────────────────────────────────────
  function mount(slides) {
    _i = 0;
    const bars = slides.map(() => `<div class="bar"><i></i></div>`).join('');
    const slideEls = slides.map((s) => `<section class="slide ${s.cls}">${s.html}</section>`).join('');
    app.innerHTML = `<div class="story" id="story">
      <div class="bars">${bars}</div>
      <div class="brandtag">claude wrapped</div>
      ${slideEls}
      <div class="tap left" id="tapL"></div>
      <div class="tap right" id="tapR"></div>
      <div class="hint" id="navhint">← →  ·  space to pause</div>
    </div>`;

    const story = document.getElementById('story');
    const barEls = [...story.querySelectorAll('.bar')];
    const els = [...story.querySelectorAll('.slide')];
    let idx = -1, timer = null, paused = false;

    // Giant faded background number/word per slide — derived from its headline
    // stat. Slides that already carry a .wm (e.g. the intro's year) are skipped.
    els.forEach((s) => {
      if (s.querySelector('.wm')) return;
      const cnt = s.querySelector('[data-count]');
      const big = s.querySelector('.big, .tapebadge');
      let wm = '';
      if (cnt) {
        const t = parseFloat(cnt.dataset.count) || 0;
        wm = (cnt.dataset.fmt === 'num') ? fmtNum(t) : String(Math.round(t));
      } else if (big) {
        wm = (big.textContent || '').trim().split('\n')[0].split(/\s+/)[0];
      }
      if (wm) { const w = document.createElement('div'); w.className = 'wm'; w.textContent = wm; s.prepend(w); }
    });

    function runCountups(slide) {
      slide.querySelectorAll('[data-count]').forEach((node) => {
        const target = parseFloat(node.dataset.count) || 0, fmt = node.dataset.fmt || 'int';
        const dur = 1300, t0 = performance.now();
        const val = (v) => fmt === 'num' ? fmtNum(v) : fmt === '1dp' ? (v < 10 ? v.toFixed(1) : String(Math.round(v))) : String(Math.round(v));
        function tick(t) {
          const p = Math.min(1, (t - t0) / dur), e = 1 - Math.pow(1 - p, 3);
          node.textContent = val(target * e);
          if (p < 1) requestAnimationFrame(tick); else node.textContent = val(target);
        }
        requestAnimationFrame(tick);
      });
    }

    function go(i) {
      if (i < 0 || i >= slides.length) return;
      idx = i; paused = false; story.classList.remove('paused');
      els.forEach((s, k) => s.classList.toggle('active', k === i));
      barEls.forEach((b, k) => { b.classList.remove('active', 'done'); if (k < i) b.classList.add('done'); });
      const ab = barEls[i];
      ab.style.setProperty('--dur', (slides[i].dur || 5200) + 'ms');
      void ab.offsetWidth; // reflow → restart fill animation
      ab.classList.add('active');
      // The finale carries its own "screenshot to share" hint — hide the
      // nav hint there so the two don't stack at the bottom edge.
      const nh = document.getElementById('navhint');
      if (nh) nh.style.visibility = (i === slides.length - 1) ? 'hidden' : 'visible';
      setTimeout(() => { if (idx === i) runCountups(els[i]); }, 220);
      clearTimeout(timer);
      if (i < slides.length - 1) timer = setTimeout(() => { if (!paused) go(idx + 1); }, slides[i].dur || 5200);
      if (i === slides.length - 1) wireFinale();
    }
    const next = () => go(Math.min(idx + 1, slides.length - 1));
    const prev = () => go(Math.max(idx - 1, 0));
    function pauseToggle() {
      paused = !paused; story.classList.toggle('paused', paused);
      if (paused) clearTimeout(timer);
      else if (idx < slides.length - 1) timer = setTimeout(() => go(idx + 1), slides[idx].dur || 5200);
    }

    document.getElementById('tapL').onclick = prev;
    document.getElementById('tapR').onclick = next;
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') next();
      else if (e.key === 'ArrowLeft') prev();
      else if (e.key === ' ') { e.preventDefault(); pauseToggle(); }
    });

    let wired = false;
    function wireFinale() {
      if (wired) return; wired = true;
      const r = document.getElementById('w-replay');
      const c = document.getElementById('w-share');
      if (r) r.onclick = (e) => { e.stopPropagation(); go(0); };
      if (c) c.onclick = (e) => {
        e.stopPropagation();
        const flash = (msg) => { c.textContent = msg; setTimeout(() => c.textContent = 'share ↗', 1600); };
        // Native share sheet where available (mobile / modern browsers);
        // fall back to copying the summary + link to the clipboard.
        if (navigator.share) {
          navigator.share({ title: 'Claude Wrapped', text: _shareText, url: _shareUrl })
            .catch(() => {});
        } else {
          navigator.clipboard?.writeText(_shareText)
            .then(() => flash('copied ✓'))
            .catch(() => flash('copy failed'));
        }
      };
    }

    go(0);
  }

  // ── web-only: landing + empty states ─────────────────────────
  //
  // THE one-liner: GitHub login (zero scopes) → a 10-min pair code → one
  // paste. `setup --link <code> --wrapped` installs, wires hooks, starts the
  // daemon, verifies the machine as the login (the worker mints the board
  // profile on first contact), runs the first scan, publishes totals, and
  // puts the year-in-review right back on this page.
  const ONELINE_ID = 'oneline';
  function onelineBlock() {
    if (TOK && GH) {
      return `<div class="cmds" id="${ONELINE_ID}">
        <div><span class="d"># signed in as @${esc(GH)} · everything in one line:</span></div>
        <div><button class="btn primary" id="mint" style="margin-top:6px">⚡ mint my one-liner</button></div>
      </div>`;
    }
    const ret = encodeURIComponent(location.pathname);
    return `<div class="cmds" id="${ONELINE_ID}">
      <div><span class="d"># or do EVERYTHING in one line (install, verify, publish):</span></div>
      <div><a class="btn primary" style="margin-top:6px" href="${WORKER}/auth/login?return=${ret}">⚡ sign in with GitHub → get the one-liner</a></div>
      <div><span class="d" style="font-size:11px">zero scopes, public identity only</span></div>
    </div>`;
  }
  function wireOneline() {
    const btn = document.getElementById('mint');
    if (!btn) return;
    btn.onclick = async () => {
      btn.textContent = 'minting…'; btn.disabled = true;
      try {
        const r = await fetch(WORKER + '/pair/start', {
          method: 'POST',
          headers: { Authorization: 'Bearer ' + TOK, 'Content-Type': 'application/json' },
          body: '{}',
        });
        if (r.status === 401) { // session expired — round-trip through GitHub again
          localStorage.removeItem('crpcTok'); localStorage.removeItem('crpcGh');
          location.href = WORKER + '/auth/login?return=' + encodeURIComponent(location.pathname);
          return;
        }
        if (!r.ok) throw new Error('http ' + r.status);
        const { code, expiresInSec } = await r.json();
        const cmd = `npx claude-rpc@latest setup --link ${code} --wrapped`;
        const box = document.getElementById(ONELINE_ID);
        box.innerHTML = `
          <div><span class="d"># paste in any terminal. installs, verifies you as @${esc(GH)}, publishes your wrapped:</span></div>
          <div><span class="c" id="cmdtext">${esc(cmd)}</span></div>
          <div style="margin-top:8px"><button class="btn primary" id="copycmd">copy</button>
            <span class="d" style="font-size:11px"> code lasts ${Math.round((expiresInSec || 600) / 60)} min · then refresh your wrapped here</span></div>`;
        const cp = document.getElementById('copycmd');
        cp.onclick = () => {
          navigator.clipboard?.writeText(cmd)
            .then(() => { cp.textContent = 'copied ✓'; setTimeout(() => cp.textContent = 'copy', 1600); })
            .catch(() => { cp.textContent = 'select + copy above'; });
        };
      } catch {
        btn.textContent = 'try again'; btn.disabled = false;
      }
    };
  }

  const CMDS = `<div class="cmds">
      <div><span class="d"># install once</span></div>
      <div><span class="c">npx claude-rpc@latest setup</span></div>
      <div><span class="d"># put your year on the web</span></div>
      <div><span class="c">claude-rpc wrapped --publish</span></div>
    </div>`;

  function landing() {
    document.body.classList.add('page');
    app.innerHTML = `<div class="page-wrap">
      <div class="kicker">claude-rpc presents</div>
      <div class="big">Claude Wrapped</div>
      <div class="sub">your year with Claude Code as an animated story: hours, streaks, tokens, top language, peak hours. published with one command, watched anywhere.</div>
      <div class="handle-row">
        <input id="h" type="text" placeholder="leaderboard handle" autocomplete="off" spellcheck="false" />
        <button class="btn primary" id="goh">watch →</button>
      </div>
      ${onelineBlock()}
      ${CMDS}
    </div>`;
    const go = () => {
      const h = (document.getElementById('h').value || '').trim().toLowerCase();
      if (h) location.href = '/wrapped/' + encodeURIComponent(h);
    };
    document.getElementById('goh').onclick = go;
    document.getElementById('h').addEventListener('keydown', (e) => { if (e.key === 'Enter') go(); });
    wireOneline();
  }

  function emptyState(title, sub) {
    document.body.classList.add('page');
    app.innerHTML = `<div class="page-wrap">
      <div class="kicker">claude wrapped</div>
      <div class="big">${title}</div>
      <div class="sub">${sub}</div>
      ${onelineBlock()}
      ${CMDS}
      <div class="handle-row"><a class="btn" href="/wrapped">← try another handle</a></div>
    </div>`;
    wireOneline();
  }

  // ── boot ─────────────────────────────────────────────────────
  if (!HANDLE) { landing(); return; }

  const yearQ = /^\d{4}$/.test(YEAR_PARAM) ? '&year=' + YEAR_PARAM : '';
  fetch(`${WORKER}/wrapped?handle=${encodeURIComponent(HANDLE)}${yearQ}`)
    .then(async (r) => {
      if (r.status === 404) {
        let err = '';
        try { err = (await r.json()).error || ''; } catch { /* body shape is ours, but never trust it */ }
        if (/no such profile/i.test(err)) {
          emptyState('no such profile', `nobody on the board is called "${esc(HANDLE)}". handles come from the claude-rpc leaderboard.`);
        } else {
          emptyState(`@${esc(HANDLE)} hasn't wrapped yet`, 'the profile exists, but no year has been published. it takes one command:');
        }
        return null;
      }
      if (!r.ok) throw new Error('http ' + r.status);
      return r.json();
    })
    .then((data) => {
      if (!data) return;
      const w = data.wrapped || {};
      const who = data.displayName || '@' + data.handle;
      document.title = `${who} · Claude Wrapped ${data.year} · claude-rpc`;
      _shareUrl = `${SITE}/wrapped/${encodeURIComponent(data.handle)}`;
      _posterUrl = `${WORKER}/wrapped/${encodeURIComponent(data.handle)}.svg?year=${data.year}`;
      // Adapter: published payload → the exact shape the local slides consume.
      const d = {
        who, handle: data.handle, verified: !!data.verified, year: data.year,
        generatedAt: data.publishedAt || Date.now(),
        activeMs: w.activeMs || 0,
        sessions: w.sessions || 0,
        prompts: w.prompts || 0,
        tokens: w.tokens || 0,
        cachePct: w.cachePct || 0,
        streak: w.streak || 0,
        longestStreak: w.streakBest || 0,
        daysSinceFirst: w.daysSinceFirst || w.daysActive || 1,
        topLanguage: (w.topLanguages || []).length
          ? (typeof w.topLanguages[0] === 'string' ? { name: w.topLanguages[0], edits: 0 } : w.topLanguages[0])
          : null,
        hotspot: w.hotspot || null,
        peakHour: w.peakHour != null ? w.peakHour : null,
        peakWeekday: w.peakWeekday ? { name: w.peakWeekday.name, hours: (w.peakWeekday.activeMs || 0) / 3.6e6 } : null,
        modelSplit: (w.topModels || []).map((mm) => ({ model: mm.name, costPct: (mm.pct || 0) / 100 })),
        linesAdded: w.linesAdded || 0,
        linesNet: (w.linesAdded || 0) - (w.linesRemoved || 0),
        cost: w.costUsd || 0,
        bestDay: w.peakDay ? { date: w.peakDay.date, hours: (w.peakDay.activeMs || 0) / 3.6e6 } : null,
      };
      if (!d.sessions && !d.tokens) {
        emptyState(`@${esc(HANDLE)}'s wrapped is empty`, 'the published year has no activity in it. re-publish after a scan:');
        return;
      }
      document.querySelector('.homelink')?.remove(); // fullscreen story owns the frame
      mount(buildSlides(d));
    })
    .catch(() => {
      emptyState("couldn't load this wrapped", "the stats service didn't answer. try again in a moment.");
    });
})();
</script>
</body>
</html>
