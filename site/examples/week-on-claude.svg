    <g><rect x="64" y="337" width="123.83333333333333" height="58" fill="#c2491e" opacity="0.9"/><rect x="189.33333333333331" y="363.7330757695029" width="123.83333333333333" height="31.266924230497118" fill="#c2491e" opacity="0.6925882052366156"/><rect x="314.66666666666663" y="394.6634104717908" width="123.83333333333333" height="0.33658952820914456" fill="#c2491e" opacity="0.45261147047748473"/><rect x="440" y="362.19264045120934" width="123.83333333333333" height="32.80735954879067" fill="#c2491e" opacity="0.7045398585682034"/><rect x="565.3333333333333" y="351.3901618340909" width="123.83333333333333" height="43.60983816590911" fill="#c2491e" opacity="0.7883521926665362"/><rect x="690.6666666666666" y="390.51924791404184" width="123.83333333333333" height="4.4807520859581675" fill="#c2491e" opacity="0.48476445583933064"/></g>
  </g>

