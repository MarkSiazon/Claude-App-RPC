# CI on every push and PR — the release workflow only fires on tags, so
# without this, main can sit broken for days and nobody finds out until the
# next release build. Same test matrix as release.yml's gate, plus the static
# checks (lint / typecheck) that release doesn't run at all. format:check is
# deliberately NOT gated: the tree has never been prettier-clean, and a
# 77-file reformat isn't worth the churn until it's done as its own commit.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '20', '22']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install deps
        run: npm ci || npm install
      - name: Run tests
        run: npm test
      - name: Run worker tests
        run: |
          npm --prefix worker ci || npm --prefix worker install
          npm --prefix worker test

  static:
    name: Lint / format / typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci || npm install
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
