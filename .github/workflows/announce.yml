name: Launch kit

# On every release tag, generate ready-to-post announcement drafts from the
# top CHANGELOG entry and open a GitHub issue with them. NOTHING is posted to
# any external platform — the issue is a copy/paste kit for a human to publish
# under their own account. See scripts/announce.js for the rationale.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # generate on demand against the current CHANGELOG top

permissions:
  contents: read
  issues: write        # to open the launch-kit issue

jobs:
  launch-kit:
    name: Generate launch kit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate drafts from CHANGELOG
        id: gen
        run: |
          VERSION=$(node scripts/announce.js --out launchkit.md)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Open launch-kit issue
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.gen.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          # Each kit supersedes the last, so close any still-open launch-kit
          # issues first — otherwise every release stacks another disposable
          # draft on the tracker. Exact-prefix match on the title so we never
          # touch hand-written issues that merely contain "launch kit".
          gh issue list --state open --limit 100 --json number,title \
            -q '.[] | select(.title | startswith("🚀 Launch kit:")) | .number' \
            | while read -r n; do
            [ -n "$n" ] && gh issue close "$n" --reason "not planned" \
              --comment "Superseded by the v${VERSION} launch kit." || true
          done

          gh issue create \
            --title "🚀 Launch kit: v${VERSION}" \
            --body-file launchkit.md \
            --label launch-kit || \
          gh issue create \
            --title "🚀 Launch kit: v${VERSION}" \
            --body-file launchkit.md
        # The fallback drops --label in case the label doesn't exist yet.
