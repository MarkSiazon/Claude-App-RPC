name: Launch kit

# On every release tag, generate ready-to-post announcement drafts from the
# top CHANGELOG entry and open a GitHub issue with them. NOTHING is posted to
# any external platform — the issue is a copy/paste kit for a human to publish
# under their own account. See scripts/announce.js for the rationale.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # generate on demand against the current CHANGELOG top

permissions:
  contents: read
  issues: write        # to open the launch-kit issue

jobs:
  launch-kit:
    name: Generate launch kit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate drafts from CHANGELOG
        id: gen
        run: |
          VERSION=$(node scripts/announce.js --out launchkit.md)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Open launch-kit issue
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.gen.outputs.version }}
        run: |
          gh issue create \
            --title "🚀 Launch kit: v${VERSION}" \
            --body-file launchkit.md \
            --label launch-kit || \
          gh issue create \
            --title "🚀 Launch kit: v${VERSION}" \
            --body-file launchkit.md
        # The fallback drops --label in case the label doesn't exist yet.
