<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 250" width="1000" height="250" role="img" aria-labelledby="t d">
  <title id="t">claude-rpc</title>
  <desc id="d">claude-rpc — Discord Rich Presence for Claude Code. Live model, project, tokens, and lifetime stats, driven by the hooks Claude Code already fires. Install with: npx claude-rpc setup.</desc>
  <defs>
    <style>
      .disp { font-family: "Space Grotesk", "Inter Tight", system-ui, sans-serif; }
      .mono { font-family: "JetBrains Mono", "DejaVu Sans Mono", ui-monospace, monospace; }
    </style>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#2b2722" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <!-- paper + dot grid + terracotta top rule -->
  <rect width="1000" height="250" fill="#f4ede0"/>
  <rect width="1000" height="250" fill="url(#dots)"/>
  <rect width="1000" height="7" fill="#d97757"/>

  <!-- ── left: wordmark + pitch + install chip ── -->
  <text x="55" y="56" class="mono" font-size="14" font-weight="700" letter-spacing="4" fill="#b8552f">DISCORD RICH PRESENCE</text>

  <text x="52" y="128" class="disp" font-size="70" font-weight="800" letter-spacing="-2" fill="#2b2722">claude-<tspan fill="#d97757">rpc</tspan></text>

  <text x="55" y="163" class="disp" font-size="21" font-weight="500" fill="#2b2722">Claude Code, live on Discord</text>
  <text x="55" y="189" class="mono" font-size="13" fill="#6b6357">live model · project · tokens · lifetime stats — driven by hooks</text>

  <rect x="55" y="206" width="298" height="32" rx="4" fill="#2b2722"/>
  <text x="71" y="227" class="mono" font-size="15" fill="#d97757">$</text>
  <text x="88" y="227" class="mono" font-size="15" fill="#f4ede0">npx claude-rpc setup</text>

  <!-- ── right: live presence-card motif ── -->
  <g transform="translate(648 42)">
    <rect x="6" y="7" width="300" height="186" rx="8" fill="#e1d6c0"/>
    <rect width="300" height="186" rx="8" fill="#ebe2d2" stroke="#2b2722" stroke-width="2.5"/>
    <rect x="22" y="24" width="60" height="60" rx="10" fill="#d97757"/>
    <circle cx="76" cy="80" r="10" fill="#5a7d4f" stroke="#ebe2d2" stroke-width="3"/>
    <text x="100" y="42" class="mono" font-size="15" font-weight="700" fill="#2b2722">Claude Code</text>
    <text x="100" y="64" class="mono" font-size="13" fill="#6b6357">Editing src/daemon.js</text>
    <text x="100" y="84" class="mono" font-size="12" fill="#9a9183">claude-rpc · Opus 4.8</text>
    <rect x="22" y="112" width="256" height="28" rx="4" fill="#f4ede0" stroke="#2b2722" stroke-width="1.5"/>
    <text x="33" y="131" class="mono" font-size="12" fill="#6b6357">3.2h · 1.4M tokens · 12d streak</text>
    <rect x="22" y="150" width="126" height="26" rx="4" fill="#5865F2"/>
    <text x="85" y="168" class="mono" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Get claude-rpc</text>
  </g>
</svg>
