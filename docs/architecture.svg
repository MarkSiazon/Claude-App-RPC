<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" aria-labelledby="title desc" role="img" viewBox="0 0 880 320"><title id="title">claude-rpc architecture</title><desc id="desc">Claude Code fires a lifecycle event as stdin JSON into hook.js, which writes state.json read by daemon.js, which pushes an IPC frame to the Discord desktop client. scanner.js reads the Claude Code transcripts under ~/.claude/projects and feeds aggregate.json into daemon.js.</desc><defs><pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#1a1611" opacity=".07"/></pattern><marker id="arr" markerHeight="7" markerWidth="7" orient="auto-start-reverse" refX="8.5" refY="5" viewBox="0 0 10 10"><path fill="none" stroke="#5c5147" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" d="M0.5 1 L9 5 L0.5 9"/></marker></defs><rect width="880" height="320" fill="#f4ede0"/><rect width="880" height="320" fill="url(#dots)"/><g fill="none" stroke="#5c5147" stroke-width="2" marker-end="url(#arr)"><line x1="180" x2="251" y1="88" y2="88"/><line x1="403" x2="474" y1="88" y2="88"/><line x1="626" x2="697" y1="88" y2="88"/><line x1="551" x2="551" y1="214" y2="124"/><line x1="403" x2="474" y1="248" y2="248"/></g><g fill="#5c5147" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" text-anchor="middle"><g><rect width="62" height="15" x="186" y="70" fill="#f4ede0" rx="4"/><text x="217" y="81">stdin JSON</text></g><g><rect width="60" height="15" x="409" y="70" fill="#f4ede0" rx="4"/><text x="439" y="81">state.json</text></g><g><rect width="56" height="15" x="633" y="70" fill="#f4ede0" rx="4"/><text x="661" y="81">IPC frame</text></g><text x="563" y="172" text-anchor="start">aggregate.json</text><g><rect width="64" height="15" x="409" y="231" fill="#f4ede0" rx="4"/><text x="441" y="242">reads .jsonl</text></g></g><g transform="translate(30 56)"><rect width="150" height="64" x="4" y="5" fill="#e1d6c0" rx="12"/><rect width="150" height="64" fill="#fbf7ef" stroke="#1a1611" stroke-width="2" rx="12"/><text x="75" y="33" fill="#1a1611" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">Claude Code</text><text x="75" y="51" fill="#8a7c6d" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10.5" text-anchor="middle">fires hooks</text></g><g transform="translate(253 56)"><rect width="150" height="64" x="4" y="5" fill="#e1d6c0" rx="12"/><rect width="150" height="64" fill="#f6dccb" stroke="#1a1611" stroke-width="2" rx="12"/><text x="75" y="33" fill="#c2491e" font-family="JetBrains Mono, ui-monospace, monospace" font-size="16" font-weight="700" text-anchor="middle">hook.js</text><text x="75" y="51" fill="#8a7c6d" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10.5" text-anchor="middle">~20ms · per event</text></g><g transform="translate(476 56)"><rect width="150" height="64" x="4" y="5" fill="#e1d6c0" rx="12"/><rect width="150" height="64" fill="#f6dccb" stroke="#1a1611" stroke-width="2" rx="12"/><text x="75" y="33" fill="#c2491e" font-family="JetBrains Mono, ui-monospace, monospace" font-size="16" font-weight="700" text-anchor="middle">daemon.js</text><text x="75" y="51" fill="#8a7c6d" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10.5" text-anchor="middle">long-lived</text></g><g transform="translate(699 56)"><rect width="150" height="64" x="4" y="5" fill="#e1d6c0" rx="12"/><rect width="150" height="64" fill="#fbf7ef" stroke="#1a1611" stroke-width="2" rx="12"/><rect width="11" height="11" x="16" y="26" fill="#5865f2" rx="2.5"/><text x="84" y="33" fill="#1a1611" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">Discord</text><text x="75" y="51" fill="#8a7c6d" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10.5" text-anchor="middle">desktop · RPC</text></g><g transform="translate(476 216)"><rect width="150" height="64" x="4" y="5" fill="#e1d6c0" rx="12"/><rect width="150" height="64" fill="#f6dccb" stroke="#1a1611" stroke-width="2" rx="12"/><text x="75" y="33" fill="#c2491e" font-family="JetBrains Mono, ui-monospace, monospace" font-size="16" font-weight="700" text-anchor="middle">scanner.js</text><text x="75" y="51" fill="#8a7c6d" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10.5" text-anchor="middle">incremental</text></g><g transform="translate(233 216)"><rect width="170" height="64" fill="#ebe2d2" stroke="#8a7c6d" stroke-dasharray="5 5" stroke-width="2" rx="12"/><text x="85" y="32" fill="#5c5147" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11.5" font-weight="700" text-anchor="middle">~/.claude/projects</text><text x="85" y="50" fill="#8a7c6d" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10.5" text-anchor="middle">**/*.jsonl transcripts</text></g><text x="30" y="306" fill="#8a7c6d" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11">no database · no message bus · no polling when Claude Code is idle · zero runtime deps</text></svg>