<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 320" width="880" height="320" role="img" aria-labelledby="title desc">
  <title id="title">claude-rpc architecture</title>
  <desc id="desc">Claude Code fires a lifecycle event as stdin JSON into hook.js, which writes state.json read by daemon.js, which pushes an IPC frame to the Discord desktop client. scanner.js reads the Claude Code transcripts under ~/.claude/projects and feeds aggregate.json into daemon.js.</desc>

  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1a1611" opacity="0.07"/>
    </pattern>
    <marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0.5 1 L9 5 L0.5 9" fill="none" stroke="#5c5147" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="880" height="320" fill="#f4ede0"/>
  <rect width="880" height="320" fill="url(#dots)"/>

  <!-- ── flow edges (drawn first, boxes sit on top) ── -->
  <g fill="none" stroke="#5c5147" stroke-width="2" marker-end="url(#arr)">
    <line x1="180" y1="88" x2="251" y2="88"/>   <!-- Claude Code → hook -->
    <line x1="403" y1="88" x2="474" y2="88"/>   <!-- hook → daemon -->
    <line x1="626" y1="88" x2="697" y2="88"/>   <!-- daemon → Discord -->
    <line x1="551" y1="214" x2="551" y2="124"/> <!-- scanner → daemon (up) -->
    <line x1="403" y1="248" x2="474" y2="248"/> <!-- transcripts → scanner -->
  </g>

  <!-- ── edge labels ── -->
  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#5c5147" text-anchor="middle">
    <g><rect x="186" y="70" width="62" height="15" rx="4" fill="#f4ede0"/><text x="217" y="81">stdin JSON</text></g>
    <g><rect x="409" y="70" width="60" height="15" rx="4" fill="#f4ede0"/><text x="439" y="81">state.json</text></g>
    <g><rect x="633" y="70" width="56" height="15" rx="4" fill="#f4ede0"/><text x="661" y="81">IPC frame</text></g>
    <text x="563" y="172" text-anchor="start">aggregate.json</text>
    <g><rect x="409" y="231" width="64" height="15" rx="4" fill="#f4ede0"/><text x="441" y="242">reads .jsonl</text></g>
  </g>

  <!-- ── boxes ── -->
  <!-- Claude Code (source) -->
  <g transform="translate(30 56)">
    <rect x="4" y="5" width="150" height="64" rx="12" fill="#e1d6c0"/>
    <rect width="150" height="64" rx="12" fill="#fbf7ef" stroke="#1a1611" stroke-width="2"/>
    <text x="75" y="33" text-anchor="middle" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#1a1611">Claude Code</text>
    <text x="75" y="51" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10.5" fill="#8a7c6d">fires hooks</text>
  </g>

  <!-- hook.js -->
  <g transform="translate(253 56)">
    <rect x="4" y="5" width="150" height="64" rx="12" fill="#e1d6c0"/>
    <rect width="150" height="64" rx="12" fill="#f6dccb" stroke="#1a1611" stroke-width="2"/>
    <text x="75" y="33" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="16" font-weight="700" fill="#c2491e">hook.js</text>
    <text x="75" y="51" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10.5" fill="#8a7c6d">~20ms · per event</text>
  </g>

  <!-- daemon.js -->
  <g transform="translate(476 56)">
    <rect x="4" y="5" width="150" height="64" rx="12" fill="#e1d6c0"/>
    <rect width="150" height="64" rx="12" fill="#f6dccb" stroke="#1a1611" stroke-width="2"/>
    <text x="75" y="33" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="16" font-weight="700" fill="#c2491e">daemon.js</text>
    <text x="75" y="51" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10.5" fill="#8a7c6d">long-lived</text>
  </g>

  <!-- Discord desktop (sink) -->
  <g transform="translate(699 56)">
    <rect x="4" y="5" width="150" height="64" rx="12" fill="#e1d6c0"/>
    <rect width="150" height="64" rx="12" fill="#fbf7ef" stroke="#1a1611" stroke-width="2"/>
    <rect x="16" y="26" width="11" height="11" rx="2.5" fill="#5865f2"/>
    <text x="84" y="33" text-anchor="middle" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#1a1611">Discord</text>
    <text x="75" y="51" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10.5" fill="#8a7c6d">desktop · RPC</text>
  </g>

  <!-- scanner.js -->
  <g transform="translate(476 216)">
    <rect x="4" y="5" width="150" height="64" rx="12" fill="#e1d6c0"/>
    <rect width="150" height="64" rx="12" fill="#f6dccb" stroke="#1a1611" stroke-width="2"/>
    <text x="75" y="33" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="16" font-weight="700" fill="#c2491e">scanner.js</text>
    <text x="75" y="51" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10.5" fill="#8a7c6d">incremental</text>
  </g>

  <!-- transcripts (data source) -->
  <g transform="translate(233 216)">
    <rect width="170" height="64" rx="12" fill="#ebe2d2" stroke="#8a7c6d" stroke-width="2" stroke-dasharray="5 5"/>
    <text x="85" y="32" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11.5" font-weight="700" fill="#5c5147">~/.claude/projects</text>
    <text x="85" y="50" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10.5" fill="#8a7c6d">**/*.jsonl transcripts</text>
  </g>

  <!-- footnote -->
  <text x="30" y="306" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#8a7c6d">no database · no message bus · no polling when Claude Code is idle · zero runtime deps</text>
</svg>
